<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI学生评语生成器</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f4f6fb;
      --surface: #ffffff;
      --text: #1a1d26;
      --muted: #5c6370;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --primary-soft: #eef2ff;
      --border: #e2e8f0;
      --shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
      --radius: 14px;
      --radius-sm: 10px;
      --gold: #b45309;
      --gold-bg: #fffbeb;
      --steady: #0369a1;
      --steady-bg: #e0f2fe;
      --care: #b91c1c;
      --care-bg: #fef2f2;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 15px;
      color: var(--text);
      background: var(--bg);
      line-height: 1.55;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }

    header {
      margin-bottom: 1.75rem;
    }

    header h1 {
      margin: 0 0 0.35rem;
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header .hint {
      margin: 0;
      color: var(--muted);
      font-size: 0.92rem;
    }

    code.inline {
      font-size: 0.85em;
      background: var(--primary-soft);
      color: var(--primary);
      padding: 0.12em 0.4em;
      border-radius: 6px;
    }

    .main-grid {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 1.25rem;
      align-items: start;
    }

    @media (max-width: 840px) {
      .main-grid {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .panel-head {
      padding: 0.85rem 1.1rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.95rem;
    }

    .panel-body {
      padding: 1rem 1.1rem;
    }

    label[for="bulk-input"] {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.88rem;
      color: var(--muted);
    }

    #bulk-input {
      width: 100%;
      min-height: 280px;
      padding: 0.85rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: ui-monospace, "Cascadia Code", "Consolas", monospace-zh, monospace;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
      background: #fafbfc;
    }

    #bulk-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-soft);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      width: 100%;
      padding: 0.75rem 1rem;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.08s, box-shadow 0.15s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 2px 12px rgba(79, 70, 229, 0.35);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      background: #f8fafc;
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
    }

    .actions .note {
      font-size: 0.8rem;
      color: var(--muted);
      margin: 0;
      text-align: center;
    }

    .results-section {
      margin-top: 2rem;
    }

    .results-section h2 {
      font-size: 1.1rem;
      margin: 0 0 1rem;
      font-weight: 600;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 1.15rem 1.25rem;
    }

    .card-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 0.75rem;
      margin-bottom: 0.75rem;
    }

    .card-name {
      font-size: 1.15rem;
      font-weight: 700;
      margin: 0;
    }

    .badge {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: none;
      letter-spacing: 0.02em;
      padding: 0.25rem 0.55rem;
      border-radius: 999px;
    }

    .badge-gold {
      background: var(--gold-bg);
      color: var(--gold);
    }

    .badge-steady {
      background: var(--steady-bg);
      color: var(--steady);
    }

    .badge-care {
      background: var(--care-bg);
      color: var(--care);
    }

    .card-meta {
      margin: 0;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .card-comment {
      margin: 0;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .card-error {
      border-color: var(--error-border);
      background: var(--error-bg);
    }

    .card-error .card-comment {
      color: var(--care);
      font-weight: 500;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 2rem 1rem;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px dashed var(--border);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>AI学生评语生成器</h1>
      <p class="hint">
        请提供每行一名学生的数据，列为 <strong>姓名、这次成绩、上次成绩、出勤率、作业表现</strong>，可用 <strong>Tab</strong>、空格、<strong>顿号</strong> <code class="inline">、</code> 或中英文逗号 <code class="inline">,</code> <code class="inline">，</code> 分隔。<strong>至少需要提供姓名与这次成绩才可分析。</strong>
      </p>
    </header>

    <div class="main-grid">
      <div class="panel">
        <div class="panel-head">批量输入</div>
        <div class="panel-body">
          <label for="bulk-input">粘贴或输入多行数据</label>
          <textarea
            id="bulk-input"
            placeholder="赵六	88&#10;张三	88	82	95%	优&#10;李四、88、71、全勤、良"
            spellcheck="false"
          ></textarea>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">操作</div>
        <div class="panel-body actions">
          <button type="button" class="btn btn-primary" id="btn-generate">生成 AI 评语</button>
          <button type="button" class="btn btn-secondary" id="btn-export" disabled>导出 Excel（姓名 | 评语）</button>
          <p class="note">导出为 .xlsx；若加载失败则尝试 CSV</p>
        </div>
      </div>
    </div>

    <section class="results-section" aria-live="polite">
      <h2>评语卡片</h2>
      <div id="results" class="cards"></div>
    </section>
  </div>

  <script>
    /* ========== 【可修改区域】学生评语 Prompt / 话术配置 BEGIN ==========
       说明：修改下列文案即可调整 AI 语气与结构。模板中可用占位符：
       {name} 姓名 | {last} 上次成绩 | {current} 这次成绩 | {delta} 分数差（仅当有上次时）
       {attendance} 出勤率原文 | {homework} 作业表现原文 | {toneOpening} 开场白（来自 tone.openings 随机）
       {attSlot} 出勤嵌入句（无出勤列时为空白）| {hwSlot} 作业嵌入句（无作业列时为空白）
       与上次成绩相关的句式占位（无上次时扩展为空字符串，不写进退步）：
       {lastTailComma} {lastTailPause} {lastParen} {lastInParen}
    ========== */
    const COMMENT_PROMPT = {
      tone: {
        openings: [
          "老师这段时间看下来，",
          "老师从你这几周的状态来说，",
          "老师留意到你这段时间的走势，",
          "老师跟你说哈，",
          "老师直说一句：",
          "老师整体印象是，",
        ],
      },
      tiers: {
        gold: {
          label: "金牌激励型",
          templates: [
            "{name}，{toneOpening}这次能拿到 {current} 分，确实很亮眼——不只是分数高，更像是底子稳、发挥也稳。{attSlot}{hwSlot}老师建议你接下来不妨给自己一点小挑战：试试综合一点的题，或者把解题步骤写得更紧凑，看看还能不能再抠出一点细节上的优势。",
            "{toneOpening}{name}这次 {current} 分，说明你在关键知识点上吃得比较透，考试时也能把水平正常发挥出来。{attSlot}{hwSlot}老师很期待你保持这份劲头，同时别光顾着刷题，偶尔回头把错题归类一下，往往会事半功倍。",
            "{name}，老师先夸夸你：{current} 分这件事本身就是很强的信号——看得出来你是认真在学、也在用对方法。{toneOpening}{attSlot}{hwSlot}继续保持就好；要是偶尔觉得太顺了，可以试试给自己限时，练一练临场的手感。",
          ],
        },
        steady: {
          label: "稳步进阶型",
          templates: [
            "{name}，{toneOpening}这次 {current} 分{lastTailComma}，整体处在一个挺健康的区间——基础不差，往上走也完全有空间。{attSlot}{hwSlot}后面最值得做的是把错题收拢：同类错误少犯一次，分数往往会悄悄涨上去。",
            "{toneOpening}{name}目前 {current} 分{lastParen}，老师觉得更像是稳住了底盘。{attSlot}{hwSlot}下一步可以试试两件事：一是薄弱点集中补一补；二是做题时给自己掐个时间，避免考场上手忙脚乱。",
            "对 {name} 来说，{toneOpening}{current} 分说明你在跟上节奏，只是离特别稳还差一层窗户纸。{attSlot}{hwSlot}别急着贪多，先把高频错因找出来，每次作业订正到位，进步会比想象中快。",
          ],
        },
        care: {
          label: "诊断关怀型",
          templates: [
            "{name}，{toneOpening}这次 {current} 分{lastTailPause}，老师想先跟你说一句：分数不理想不代表你不行，更像是在提醒咱们换一种更省力的学法。{attSlot}{hwSlot}咱们先把目标拆小——从最基础的例题把它弄懂、做对，再一点点往上加，你会重新找回掌控感。",
            "{toneOpening}{name}这次 {current} 分，可能让你有点失落；老师理解这种心情。{attSlot}{hwSlot}换个角度看，这也是一个很清楚的导航：哪里没吃透、哪里习惯没养成就更容易露出来。老师建议你近期别硬啃难题，先把课堂内容消化扎实，有不懂的一定及时问，别让疑惑堆成山。",
            "{name}，{toneOpening}目前分数还处在爬坡期（这次 {current}{lastInParen}）。{attSlot}{hwSlot}老师想陪你把路走顺一点：每天留一小块固定时间给复习和订正，比周末突击更有效；你只要坚持一小段，就能看见变化。",
          ],
        },
      },
      progress: {
        lines: [
          "另外老师特别高兴的是，你从 {last} 分提到了 {current} 分——这一步是你自己一步一步走出来的，值得为自己鼓个掌。",
          "还有一点老师想单独夸夸你：{last} 分到 {current} 分的变化老师看见了，说明最近的用功是对症的；就这样延续下去，别松劲。",
          "成绩从 {last} 拉到 {current}，这份进步很实在；老师希望你把它当成一个新起点，会比只看分数更让人踏实。",
        ],
      },
      attendancePhrases: [
        "老师这边记的你出勤是 {attendance}，跟课跟得还算紧。",
        "出勤这一块老师记的是 {attendance}，课堂节奏基本能接上。",
        "说到出勤，你目前是 {attendance}；这块稳定了，后面学起来会轻松不少。",
        "老师看到你出勤是 {attendance}——能到课、心就更定一点。",
      ],
      homeworkPhrases: [
        "作业情况是 {homework}；老师觉得订正再抓得紧一点，巩固会更快。",
        "作业上你显示为 {homework}，算是把课堂延伸做下来了，老师看在眼里。",
        "从作业看，你是 {homework}——老师建议你把它当成小测验认真对待，效果会更好。",
        "作业这块 {homework}，老师建议你错一改三、同类题多练一遍，印象会深很多。",
      ],
    };
    /* ========== 【可修改区域】END ========== */

    let lastExportRows = [];

    /** 单行内各列可用 Tab、空格、顿号、中英文逗号分隔；连续同类分隔符保留空列位置 */
    function splitDataLine(raw) {
      const parts = [];
      let buf = "";
      const isCommaLike = (ch) => ch === "、" || ch === "," || ch === "，";
      for (let i = 0; i < raw.length; i++) {
        const c = raw[i];
        if (c === "\t" || isCommaLike(c)) {
          parts.push(buf.trim());
          buf = "";
          continue;
        }
        if (c === " " || c === "\u3000") {
          if (buf.length) {
            parts.push(buf.trim());
            buf = "";
          }
          while (
            i + 1 < raw.length &&
            (raw[i + 1] === " " || raw[i + 1] === "\u3000")
          ) {
            i++;
          }
          continue;
        }
        buf += c;
      }
      parts.push(buf.trim());
      return parts;
    }

    const PARSE_ERROR_MSG = "至少需姓名和这次成绩";

    function pick(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function pickTierKey(current) {
      if (current >= 90) return "gold";
      if (current >= 70) return "steady";
      return "care";
    }

    function badgeClassForTier(key) {
      if (key === "gold") return "badge-gold";
      if (key === "steady") return "badge-steady";
      return "badge-care";
    }

    function parseLine(line) {
      const raw = line.trim();
      if (!raw) return null;

      const parts = splitDataLine(raw);
      const missingFields = [];

      if (parts.length < 2) {
        return { error: PARSE_ERROR_MSG };
      }

      const name = parts[0];
      if (!name) {
        return { error: PARSE_ERROR_MSG };
      }

      const current = parseFloat(parts[1]);
      if (Number.isNaN(current)) {
        return { error: PARSE_ERROR_MSG };
      }

      let last = null;
      let hasLast = false;
      let attendance = null;
      let homework = null;

      if (parts.length === 2) {
        missingFields.push("上次成绩", "出勤率", "作业表现");
      } else {
        const lastRaw = parts[2];
        hasLast = lastRaw !== "" && !Number.isNaN(parseFloat(lastRaw));
        if (hasLast) last = parseFloat(lastRaw);
        else missingFields.push("上次成绩");

        if (parts.length === 3) {
          missingFields.push("出勤率", "作业表现");
        } else if (parts.length === 4) {
          const attRaw = parts[3];
          if (attRaw === "") missingFields.push("出勤率");
          else attendance = attRaw;
          missingFields.push("作业表现");
        } else {
          const attRaw = parts[3];
          if (attRaw === "") missingFields.push("出勤率");
          else attendance = attRaw;

          const hwJoined = parts.slice(4).join(",").trim();
          if (hwJoined === "") missingFields.push("作业表现");
          else homework = hwJoined;
        }
      }

      return {
        name,
        last,
        current,
        attendance,
        homework,
        hasLast,
        missingFields,
      };
    }

    function fillTemplate(str, vars) {
      return str.replace(/\{(\w+)\}/g, (_, k) =>
        vars[k] != null ? String(vars[k]) : ""
      );
    }

    function embedAttendanceHomework(attendance, homework) {
      let attSlot = "";
      let hwSlot = "";
      if (attendance != null && attendance !== "") {
        attSlot = fillTemplate(pick(COMMENT_PROMPT.attendancePhrases), {
          attendance,
        });
      }
      if (homework != null && homework !== "") {
        hwSlot = fillTemplate(pick(COMMENT_PROMPT.homeworkPhrases), {
          homework,
        });
      }
      return { attSlot, hwSlot };
    }

    function lastPlaceholders(hasLast, last) {
      if (!hasLast || last == null || Number.isNaN(last)) {
        return {
          lastTailComma: "",
          lastTailPause: "",
          lastParen: "",
          lastInParen: "",
        };
      }
      return {
        lastTailComma: `，上次 ${last} 分`,
        lastTailPause: `、上次 ${last} 分`,
        lastParen: `（上次 ${last} 分）`,
        lastInParen: `，上次 ${last}`,
      };
    }

    function generateCommentForStudent(row) {
      const tierKey = pickTierKey(row.current);
      const tier = COMMENT_PROMPT.tiers[tierKey];
      const template = pick(tier.templates);
      const { attSlot, hwSlot } = embedAttendanceHomework(
        row.attendance,
        row.homework
      );

      const hasLast = Boolean(row.hasLast);
      const lp = lastPlaceholders(hasLast, row.last);
      const delta =
        hasLast && row.last != null && !Number.isNaN(row.last)
          ? (row.current - row.last).toFixed(1)
          : "";

      const vars = {
        name: row.name,
        last: hasLast ? row.last : "",
        current: row.current,
        delta,
        attendance: row.attendance ?? "",
        homework: row.homework ?? "",
        toneOpening: pick(COMMENT_PROMPT.tone.openings),
        attSlot,
        hwSlot,
        ...lp,
      };

      let text = fillTemplate(template, vars);

      if (
        hasLast &&
        row.last != null &&
        !Number.isNaN(row.last) &&
        row.current > row.last
      ) {
        const progTpl = pick(COMMENT_PROMPT.progress.lines);
        text += "\n\n" + fillTemplate(progTpl, vars);
      }

      return { tierKey, label: tier.label, text };
    }

    function parseInput(text) {
      const lines = text.split(/\r?\n/);
      const rows = [];
      for (const line of lines) {
        const p = parseLine(line);
        if (p === null) continue;
        rows.push(p);
      }
      return rows;
    }

    function buildDisplayItems(parsed) {
      const out = [];
      for (const item of parsed) {
        if (item.error) {
          out.push({ error: item.error });
          continue;
        }
        const { tierKey, label, text } = generateCommentForStudent(item);
        out.push({
          name: item.name,
          last: item.last,
          current: item.current,
          attendance: item.attendance,
          homework: item.homework,
          hasLast: item.hasLast,
          missingFields: item.missingFields,
          tierKey,
          label,
          text,
        });
      }
      return out;
    }

    function renderResults(items) {
      const root = document.getElementById("results");
      root.innerHTML = "";

      if (!items.length) {
        root.innerHTML =
          '<p class="empty-state">暂无数据。请在左侧输入至少一行有效内容后点击生成 AI 评语。</p>';
        return;
      }

      for (const item of items) {
        const card = document.createElement("article");
        card.className = "card" + (item.error ? " card-error" : "");

        if (item.error) {
          card.innerHTML = `<div class="card-head"><h3 class="card-name">解析错误</h3></div><p class="card-comment"></p>`;
          card.querySelector(".card-comment").textContent = item.error;
          root.appendChild(card);
          continue;
        }

        const badgeClass = badgeClassForTier(item.tierKey);
        card.innerHTML = `
          <div class="card-head">
            <h3 class="card-name"></h3>
            <span class="badge ${badgeClass}"></span>
          </div>
          <p class="card-meta"></p>
          <p class="card-comment"></p>
        `;
        card.querySelector(".card-name").textContent = item.name;
        card.querySelector(".badge").textContent = item.label;

        const metaBits = [];
        if (item.hasLast && item.last != null && !Number.isNaN(item.last)) {
          metaBits.push(`上次 ${item.last} 分`);
        }
        metaBits.push(`本次 ${item.current} 分`);
        if (item.attendance != null && item.attendance !== "") {
          metaBits.push(`出勤 ${item.attendance}`);
        }
        if (item.homework != null && item.homework !== "") {
          metaBits.push(`作业 ${item.homework}`);
        }
        let metaStr = metaBits.join(" · ");
        if (item.missingFields && item.missingFields.length) {
          metaStr += ` · 未提供列：${item.missingFields.join("、")}`;
        }
        card.querySelector(".card-meta").textContent = metaStr;
        card.querySelector(".card-comment").textContent = item.text;
        root.appendChild(card);
      }
    }

    function exportExcel() {
      if (!lastExportRows.length) {
        alert("请先生成评语后再导出。");
        return;
      }

      const aoa = [["姓名", "评语"], ...lastExportRows];

      if (typeof XLSX !== "undefined" && XLSX.utils && XLSX.writeFile) {
        try {
          const wb = XLSX.utils.book_new();
          const ws = XLSX.utils.aoa_to_sheet(aoa);
          XLSX.utils.book_append_sheet(wb, ws, "评语");
          XLSX.writeFile(wb, "学生评语.xlsx", { bookType: "xlsx" });
          return;
        } catch (e) {
          console.warn("XLSX export failed, fallback CSV", e);
        }
      }

      const csvEscape = (cell) => {
        const s = String(cell == null ? "" : cell).replace(/"/g, '""');
        return `"${s}"`;
      };
      const bom = "\uFEFF";
      const lines = aoa.map((row) => row.map(csvEscape).join(",")).join("\r\n");
      const blob = new Blob([bom + lines], {
        type: "text/csv;charset=utf-8;",
      });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "学生评语.csv";
      a.click();
      URL.revokeObjectURL(url);
    }

    let lastDisplayItems = [];

    document.getElementById("btn-generate").addEventListener("click", () => {
      const text = document.getElementById("bulk-input").value;
      const parsed = parseInput(text);
      if (parsed.some((p) => p && p.error)) {
        alert(PARSE_ERROR_MSG);
      }
      lastDisplayItems = buildDisplayItems(parsed);
      renderResults(lastDisplayItems);

      lastExportRows = lastDisplayItems
        .filter((p) => !p.error)
        .map((p) => [p.name, p.text]);
      document.getElementById("btn-export").disabled = lastExportRows.length === 0;
    });

    document.getElementById("btn-export").addEventListener("click", exportExcel);

    lastDisplayItems = [];
    renderResults([]);
  </script>
</body>
</html>
